# PostgreSQL stores the normalized POS data, mined rules, and customer clusters.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shopsphere
      POSTGRES_PASSWORD: shopsphere
      POSTGRES_DB: shopsphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # FastAPI exposes the rule engine and analytics endpoints.
  backend:
    build: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg2://shopsphere:shopsphere@postgres:5432/shopsphere
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
    ports:
      - "8000:8000"

  # Next.js renders the dashboard and live recommendation demo.
  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
